<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: rgb(170, 170, 200);
            color: rgb(200, 190, 240);
        }
        td {
            background-color: rgb(255, 255, 255);
        }
        td:first-child,
        th:first-child {
            background-color: rgb(35, 37, 70);
            color: rgb(200, 190, 240);
        }
        td:last-child,
        th:last-child {
            background-color: rgb(35, 37, 70);
            color: rgb(200, 190, 240);
        }
        td:nth-child(5n), /* Vijfde kolom en daaropvolgende */
        td:nth-child(5n-1) { /* Vierde kolom en daaropvolgende */
            background-color: rgb(250, 120, 120);
        }
        td[data-prev-next-month="true"] {
            background-color: lightgray;
        }
        td[data-weekend="true"] {
            background-color: rgb(255, 220, 220);
        }
    </style>
</head>
<body>
<table>
    <thead>
    <tr>
        <th colspan="7">November 2023</th>
    </tr>
    <tr>
        <th>Ma</th>
        <th>Di</th>
        <th>Wo</th>
        <th>Do</th>
        <th>Vr</th>
        <th>Za</th>
        <th>Zo</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td data-prev-next-month="true">31</td>
        <td data-prev-next-month="true">1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
        <td data-weekend="true">5</td>
        <td data-weekend="true">6</td>
    </tr>
    <tr>
        <td data-prev-next-month="true">7</td>
        <td data-prev-next-month="true">8</td>
        <td>9</td>
        <td>10</td>
        <td>11</td>
        <td data-weekend="true">12</td>
        <td data-weekend="true">13</td>
    </tr>
    <tr>
        <td data-prev-next-month="true">14</td>
        <td data-prev-next-month="true">15</td>
        <td>16</td>
        <td>17</td>
        <td>18</td>
        <td data-weekend="true">19</td>
        <td data-weekend="true">20</td>
    </tr>
    <tr>
        <td data-prev-next-month="true">21</td>
        <td data-prev-next-month="true">22</td>
        <td>23</td>
        <td>24</td>
        <td>25</td>
        <td data-weekend="true">25</td>
        <td data-weekend="true">26</td>
    </tr>
    <tr>
        <td data-prev-next-month="true">28</td>
        <td data-prev-next-month="true">29</td>
        <td>30</td>
        <td>31</td>
        <td>1</td>
        <td data-weekend="true">2</td>
        <td data-weekend="true">3</td>
    </tr>
    <!-- Voeg hier de rest van de dagen in -->
    </tbody>
</table>
</body>
</html>
